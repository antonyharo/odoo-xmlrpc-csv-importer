services:
  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:16
    container_name: odoo
    ports:
      - "8069:8069"
    command: odoo -d test -i base
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - ADMIN_PASSWD=admin_root_pass
    volumes:
      - odoo_data:/var/lib/odoo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(("127.0.0.1", 8069))''',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  etl:
    build: .
    container_name: odoo-etl
    profiles:
      - cli
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      odoo:
        condition: service_healthy

volumes:
  odoo_data:
  postgres_data:
